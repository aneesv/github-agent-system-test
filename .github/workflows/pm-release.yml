name: PM Agent — Release

on:
  issues:
    types: [labeled]

jobs:
  pm-release:
    name: Orchestrate release
    if: >-
      github.event.label.name == 'flow:ready-release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Read PM prompt
        id: prompt
        run: |
          SYSTEM_PROMPT=$(cat .github/prompts/pm.md)
          echo "system_prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$SYSTEM_PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Run PM Agent — Release
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the PM Agent in RELEASE mode.

            PARENT ISSUE: #${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}

            Follow the Release instructions in your system prompt:
            1. Verify ALL phase sub-issues are closed
            2. Verify ALL linked PRs are merged (not just closed)
            3. Post completion summary on parent issue
            4. Check for release-please PR
            5. Add needs:human label — human will merge the release PR
          claude_args: >-
            --system-prompt "${{ steps.prompt.outputs.system_prompt }}"
            --allowedTools "Bash(gh issue:*),Bash(gh pr:*),Bash(gh label:*),Read"
            --max-turns 15
