name: Release Human Gate

on:
  pull_request:
    types: [closed]

jobs:
  enforce-human-merge:
    name: Enforce human merge on release PRs
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    steps:
      - name: Validate merger is human
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGER: ${{ github.event.pull_request.merged_by.login }}
          MERGER_TYPE: ${{ github.event.pull_request.merged_by.type }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "Release PR #$PR_NUMBER merged by $MERGER (type: $MERGER_TYPE)"

          if [ "$MERGER_TYPE" = "Bot" ]; then
            echo "ERROR: Release PRs must be merged by humans, not bots."
            gh pr comment "$PR_NUMBER" --body "Release PRs must be merged by humans. This merge by bot ($MERGER) should be investigated."
            exit 1
          fi

          echo "Human merge confirmed by $MERGER"

      - name: Find and close parent issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Release PR merged. Looking for parent issues to close..."

          # Search for open issues with flow:ready-release label
          PARENT_ISSUES=$(gh issue list --label "flow:ready-release" --state open --json number -q '.[].number')

          for ISSUE_NUM in $PARENT_ISSUES; do
            echo "Closing parent issue #$ISSUE_NUM"

            # Remove old flow labels, add flow:released
            gh issue edit "$ISSUE_NUM" --remove-label "flow:ready-release" || true
            gh issue edit "$ISSUE_NUM" --remove-label "needs:human" || true
            gh issue edit "$ISSUE_NUM" --add-label "flow:released"

            # Post completion comment
            gh issue comment "$ISSUE_NUM" --body "Release PR #${{ github.event.pull_request.number }} has been merged by @${{ github.event.pull_request.merged_by.login }}. This issue is now complete."

            # Close the issue
            gh issue close "$ISSUE_NUM"
          done
