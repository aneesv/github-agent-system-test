name: Dev Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Sub-issue number to implement'
        required: true
        type: string

jobs:
  implement:
    name: Implement phase
    timeout-minutes: 30
    if: >-
      (github.event_name == 'issues' && github.event.label.name == 'agent/dev') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Resolve sub-issue number
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "issue_title=" >> $GITHUB_OUTPUT
            echo "issue_body=" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "issue_title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare system prompt
        run: cp .github/prompts/dev.md /tmp/system-prompt.txt

      - name: Run Dev Agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            You are the Dev Agent implementing a phase.

            SUB-ISSUE: #${{ steps.resolve.outputs.issue_number }}

            Follow your system prompt instructions:
            1. Read the sub-issue body via: gh issue view ${{ steps.resolve.outputs.issue_number }} --json body,title
            2. Parse SUB_ISSUE_META to find phase number, parent issue, scope
            3. Read the plan from parent issue thread
            4. Create a branch, implement the phase
            5. Commit with conventional commits
            6. Create a PR linked to this sub-issue

            IMPORTANT: git is already configured. When pushing, use:
              git push origin <branch-name>
            When creating PR use gh pr create.
          claude_args: |
            --append-system-prompt-file /tmp/system-prompt.txt
            --verbose
            --model claude-sonnet-4-6
            --allowedTools "Read,Write,Edit,Bash(git:*),Bash(gh pr:*),Bash(gh issue:*),Bash(gh label:*),Bash(npm:*),Bash(npx:*),Bash(find:*),Bash(ls:*),Bash(grep:*),Bash(cat:*),Bash(mkdir:*),Bash(node:*)"
            --max-turns 50
