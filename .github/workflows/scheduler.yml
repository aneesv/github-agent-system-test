name: Scheduler

on:
  issues:
    types: [labeled, closed]

jobs:
  schedule:
    name: Evaluate and activate runnable sub-issues
    timeout-minutes: 5
    if: >-
      (github.event.action == 'labeled' && startsWith(github.event.label.name, 'flow:phase-')) ||
      (github.event.action == 'closed' && contains(github.event.issue.labels.*.name, 'agent/dev'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Evaluate dependency graph and activate runnable sub-issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Determine parent issue number
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body')

          if echo "$ISSUE_BODY" | grep -q "parent_issue:"; then
            # Closed sub-issue â€” find parent
            PARENT_NUM=$(echo "$ISSUE_BODY" | grep -oP 'parent_issue: #\K[0-9]+')
            echo "Sub-issue closed, parent: #$PARENT_NUM"
          else
            # Parent got a flow:phase-* label
            PARENT_NUM="$ISSUE_NUMBER"
            echo "Phase label added to parent: #$PARENT_NUM"
          fi

          # Check if parent has risk:high label
          HAS_RISK_HIGH=$(gh issue view "$PARENT_NUM" --json labels -q '[.labels[].name] | any(. == "risk:high")')

          # Get all phase sub-issues referencing this parent (open and closed)
          echo "Fetching sub-issues for parent #$PARENT_NUM..."
          SUB_ISSUES=$(gh issue list --state all --limit 100 --json number,state,labels,body \
            -q "[.[] | select(.body | contains(\"parent_issue: #${PARENT_NUM}\")) | select(.body | contains(\"SUB_ISSUE_META\"))]")

          TOTAL=$(echo "$SUB_ISSUES" | jq 'length')
          OPEN=$(echo "$SUB_ISSUES" | jq '[.[] | select(.state == "OPEN")] | length')
          CLOSED=$(echo "$SUB_ISSUES" | jq '[.[] | select(.state == "CLOSED")] | length')

          echo "Sub-issues found: total=$TOTAL open=$OPEN closed=$CLOSED"

          # If all phase sub-issues are closed â†’ ready for release
          if [ "$TOTAL" -gt 0 ] && [ "$OPEN" -eq 0 ]; then
            echo "All sub-issues closed. Transitioning to flow:ready-release"
            # Remove all flow:phase-* labels
            gh issue view "$PARENT_NUM" --json labels -q '[.labels[].name | select(startswith("flow:phase-"))] | .[]' | \
              xargs -I{} gh issue edit "$PARENT_NUM" --remove-label "{}" 2>/dev/null || true
            gh issue edit "$PARENT_NUM" --add-label "flow:ready-release"
            gh issue comment "$PARENT_NUM" --body "All phase sub-issues are closed. Transitioning to release flow."
            exit 0
          fi

          # Collect activated issue numbers to enforce risk:high serial mode
          ACTIVATED_LIST=""

          # Activate each runnable sub-issue
          while IFS= read -r issue; do
            [ -z "$issue" ] && continue
            ISSUE_NUM=$(echo "$issue" | jq -r '.number')
            ISSUE_BODY=$(echo "$issue" | jq -r '.body')
            ISSUE_STATE=$(echo "$issue" | jq -r '.state')
            HAS_DEV=$(echo "$issue" | jq -r '[.labels[].name] | any(. == "agent/dev")')

            [ "$ISSUE_STATE" != "OPEN" ] && continue
            [ "$HAS_DEV" = "true" ] && { echo "#$ISSUE_NUM already has agent/dev, skipping"; continue; }

            # Check dependencies
            DEPENDS_ON=$(echo "$ISSUE_BODY" | grep -oP 'depends_on: \[\K[^\]]*' || echo "")
            RUNNABLE=true

            if [ -n "$DEPENDS_ON" ]; then
              for dep_raw in $(echo "$DEPENDS_ON" | tr ',' '\n' | tr -d '# '); do
                [ -z "$dep_raw" ] && continue
                DEP_STATE=$(echo "$SUB_ISSUES" | jq -r --argjson num "$dep_raw" '.[] | select(.number == $num) | .state')
                if [ "$DEP_STATE" != "CLOSED" ]; then
                  echo "#$ISSUE_NUM blocked by #$dep_raw (state: ${DEP_STATE:-not found})"
                  RUNNABLE=false
                  break
                fi
              done
            fi

            [ "$RUNNABLE" = "false" ] && continue

            # Enforce serial mode for risk:high
            if [ "$HAS_RISK_HIGH" = "true" ] && [ -n "$ACTIVATED_LIST" ]; then
              echo "risk:high serial mode â€” skipping #$ISSUE_NUM"
              continue
            fi

            echo "Activating sub-issue #$ISSUE_NUM"
            gh issue edit "$ISSUE_NUM" --add-label "agent/dev"
            ACTIVATED_LIST="$ACTIVATED_LIST $ISSUE_NUM"

          done < <(echo "$SUB_ISSUES" | jq -c '.[]')

          if [ -z "$ACTIVATED_LIST" ]; then
            echo "No sub-issues activated (all blocked or already active)"
          else
            echo "Activated:$ACTIVATED_LIST"
          fi
