name: Scheduler

on:
  issues:
    types: [labeled, closed]

# Serialize all scheduler runs globally to prevent double-activation of the same phase
# when multiple sub-issues close nearly simultaneously.
concurrency:
  group: scheduler-${{ github.repository }}
  cancel-in-progress: false

jobs:
  schedule:
    name: Evaluate and activate runnable sub-issues
    timeout-minutes: 5
    if: >-
      (github.event.action == 'labeled' && startsWith(github.event.label.name, 'flow:phase-')) ||
      (github.event.action == 'closed' && contains(github.event.issue.labels.*.name, 'agent/dev'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Evaluate dependency graph and activate runnable sub-issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Determine parent issue number
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body')

          if echo "$ISSUE_BODY" | grep -q "parent_issue:"; then
            # Closed sub-issue — find parent via native API
            PARENT_NUM=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER/parent" -q '.number // empty' 2>/dev/null || true)
            # Fallback to text parsing if native parent API returns empty
            if [ -z "$PARENT_NUM" ]; then
              PARENT_NUM=$(echo "$ISSUE_BODY" | grep -oP 'parent_issue: #\K[0-9]+')
            fi
            echo "Sub-issue closed, parent: #$PARENT_NUM"
          else
            # Parent got a flow:phase-* label
            PARENT_NUM="$ISSUE_NUMBER"
            echo "Phase label added to parent: #$PARENT_NUM"
          fi

          # Check if parent has risk:high label
          HAS_RISK_HIGH=$(gh issue view "$PARENT_NUM" --json labels -q '[.labels[].name] | any(. == "risk:high")')

          # Get all sub-issues via native API (no text grep needed)
          echo "Fetching sub-issues for parent #$PARENT_NUM via native API..."
          SUB_ISSUES=$(gh api "repos/$REPO/issues/$PARENT_NUM/sub_issues" --paginate \
            -q '[.[] | {number: .number, state: .state, labels: [.labels[].name], body: .body}]' 2>/dev/null || echo "[]")

          TOTAL=$(echo "$SUB_ISSUES" | jq 'length')
          OPEN=$(echo "$SUB_ISSUES" | jq '[.[] | select(.state == "open")] | length')
          CLOSED=$(echo "$SUB_ISSUES" | jq '[.[] | select(.state == "closed")] | length')

          echo "Sub-issues: total=$TOTAL open=$OPEN closed=$CLOSED"

          # Fallback: if native API returned empty, use text search
          if [ "$TOTAL" -eq 0 ]; then
            echo "Native API returned no results, falling back to text search..."
            SUB_ISSUES=$(gh issue list --state all --limit 100 --json number,state,labels,body \
              -q "[.[] | select(.body | test(\"parent_issue: #${PARENT_NUM}([^0-9]|$)\")) | select(.body | contains(\"SUB_ISSUE_META\")) | {number: .number, state: (.state | ascii_downcase), labels: [.labels[].name], body: .body}]")
            TOTAL=$(echo "$SUB_ISSUES" | jq 'length')
            OPEN=$(echo "$SUB_ISSUES" | jq '[.[] | select(.state == "open")] | length')
            CLOSED=$(echo "$SUB_ISSUES" | jq '[.[] | select(.state == "closed")] | length')
            echo "Fallback found: total=$TOTAL open=$OPEN closed=$CLOSED"
          fi

          # If all phase sub-issues are closed → start QA validation
          if [ "$TOTAL" -gt 0 ] && [ "$OPEN" -eq 0 ]; then
            # Guard: don't re-add flow:qa if already in QA state
            HAS_QA=$(gh issue view "$PARENT_NUM" --json labels -q '[.labels[].name] | any(. == "flow:qa" or . == "flow:qa-failed")')
            if [ "$HAS_QA" = "true" ]; then
              echo "Already in QA state, skipping"
              exit 0
            fi
            echo "All sub-issues closed. Transitioning to flow:qa"
            gh issue view "$PARENT_NUM" --json labels \
              -q '[.labels[].name | select(startswith("flow:phase-"))] | .[]' | \
              xargs -I{} gh issue edit "$PARENT_NUM" --remove-label "{}" 2>/dev/null || true
            gh issue edit "$PARENT_NUM" --remove-label "flow:implementing" 2>/dev/null || true
            gh issue edit "$PARENT_NUM" --add-label "flow:qa"
            gh workflow run qa-agent.yml --ref main -f issue_number="$PARENT_NUM"
            gh issue comment "$PARENT_NUM" --body "All phase sub-issues are closed. Starting QA validation on the plan branch."
            exit 0
          fi

          # Activate each runnable sub-issue
          ACTIVATED_LIST=""

          while IFS= read -r issue; do
            [ -z "$issue" ] && continue
            ISSUE_NUM=$(echo "$issue" | jq -r '.number')
            ISSUE_BODY_TEXT=$(echo "$issue" | jq -r '.body')
            ISSUE_STATE=$(echo "$issue" | jq -r '.state')
            HAS_DEV=$(echo "$issue" | jq -r '[.labels[]] | any(. == "agent/dev")')

            [ "$ISSUE_STATE" != "open" ] && continue
            [ "$HAS_DEV" = "true" ] && { echo "#$ISSUE_NUM already has agent/dev, skipping"; continue; }

            # Check depends_on from SUB_ISSUE_META
            DEPENDS_ON=$(echo "$ISSUE_BODY_TEXT" | grep -oP 'depends_on: \[\K[^\]]*' || echo "")
            RUNNABLE=true

            if [ -n "$DEPENDS_ON" ]; then
              for dep_raw in $(echo "$DEPENDS_ON" | tr ',' '\n' | tr -d '# '); do
                [ -z "$dep_raw" ] && continue
                # Check dep state via native API first
                DEP_STATE=$(gh api "repos/$REPO/issues/$dep_raw" -q '.state' 2>/dev/null || echo "")
                if [ "$DEP_STATE" != "closed" ]; then
                  echo "#$ISSUE_NUM blocked by #$dep_raw (state: ${DEP_STATE:-unknown})"
                  RUNNABLE=false
                  break
                fi
              done
            fi

            [ "$RUNNABLE" = "false" ] && continue

            # Enforce serial mode for risk:high
            if [ "$HAS_RISK_HIGH" = "true" ] && [ -n "$ACTIVATED_LIST" ]; then
              echo "risk:high serial mode — skipping #$ISSUE_NUM"
              continue
            fi

            echo "Activating sub-issue #$ISSUE_NUM"
            gh issue edit "$ISSUE_NUM" --add-label "agent/dev"
            gh issue edit "$PARENT_NUM" --add-label "flow:implementing" 2>/dev/null || true
            gh workflow run dev-agent.yml --ref main -f issue_number="$ISSUE_NUM"
            ACTIVATED_LIST="$ACTIVATED_LIST $ISSUE_NUM"

          done < <(echo "$SUB_ISSUES" | jq -c '.[]')

          if [ -z "$ACTIVATED_LIST" ]; then
            echo "No sub-issues activated"
          else
            echo "Activated:$ACTIVATED_LIST"
          fi
