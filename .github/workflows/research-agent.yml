name: Research Agent

on:
  issues:
    types: [labeled]

jobs:
  research:
    name: Research codebase
    timeout-minutes: 20
    if: >-
      github.event.label.name == 'agent/research' &&
      !contains(github.event.issue.labels.*.name, 'lock:research')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare system prompt
        run: cp .github/prompts/research.md /tmp/system-prompt.txt

      - name: Run Research Agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            You are the Research Agent.

            You have been assigned to research sub-issue #${{ github.event.issue.number }}.

            SUB-ISSUE TITLE: ${{ github.event.issue.title }}
            SUB-ISSUE BODY:
            ${{ github.event.issue.body }}

            Follow your system prompt instructions exactly:
            1. Parse the SUB_ISSUE_META block to find the parent issue
            2. Read the parent issue for full requirements
            3. Research the codebase thoroughly
            4. Post your RESEARCH_OUTPUT comment on this sub-issue
            5. Comment on the parent issue
            6. Create a planner sub-issue with agent/plan label
            7. Update flow labels on parent issue
            8. Close this research sub-issue
          claude_args: |
            --append-system-prompt-file /tmp/system-prompt.txt
            --verbose
            --model claude-sonnet-4-6
            --allowedTools "Read,Bash(find:*),Bash(ls:*),Bash(grep:*),Bash(cat:*),Bash(gh issue:*),Bash(gh label:*),Bash(gh api:*),Bash(gh repo:*)"
            --max-turns 30
