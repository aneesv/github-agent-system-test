name: Review Agent

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    name: Review PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Review prompt
        id: prompt
        run: |
          SYSTEM_PROMPT=$(cat .github/prompts/review.md)
          echo "system_prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$SYSTEM_PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

      - name: Run Review Agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the Review Agent reviewing a pull request.

            PR NUMBER: #${{ github.event.pull_request.number }}
            TITLE: ${{ github.event.pull_request.title }}
            AUTHOR: ${{ github.event.pull_request.user.login }}
            BASE: ${{ github.event.pull_request.base.ref }}
            HEAD: ${{ github.event.pull_request.head.ref }}

            PR BODY:
            ${{ github.event.pull_request.body }}

            Follow your system prompt instructions:
            1. Check for PR_META block to determine if this is an agent PR
            2. If agent PR, read linked sub-issue and plan for context
            3. Review the full diff thoroughly
            4. Either request changes or approve
            5. If approved, merge the PR and close the linked sub-issue
          claude_args: >-
            --system-prompt "${{ steps.prompt.outputs.system_prompt }}"
            --allowedTools "Read,Bash(gh pr:*),Bash(gh issue:*),Bash(gh label:*),Bash(git diff:*),Bash(git log:*),Bash(cat:*),Bash(grep:*)"
            --max-turns 20
