name: Planner Agent

on:
  issues:
    types: [labeled]

# Serialize planner runs to avoid duplicate plan posts
concurrency:
  group: planner-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan-create:
    name: Create implementation plan
    timeout-minutes: 15
    if: >-
      github.event_name == 'issues' &&
      github.event.label.name == 'agent/plan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare system prompt
        run: cp .github/prompts/planner.md /tmp/system-prompt.txt

      - name: Run Planner Agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            You are the Planner Agent creating an initial implementation plan.

            PLAN SUB-ISSUE: #${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            BODY:
            ${{ github.event.issue.body }}

            Follow your system prompt instructions:
            1. Parse SUB_ISSUE_META to find parent and research issues
            2. Read research findings
            3. Create a detailed implementation plan with dependency graph
            4. Post PLAN_OUTPUT comment on this sub-issue
            5. Summarize on parent issue
            6. Add flow:pm-review to parent (remove flow:planning)
          claude_args: |
            --append-system-prompt-file /tmp/system-prompt.txt
            --verbose
            --model claude-sonnet-4-6
            --allowedTools "Read,Bash(grep:*),Bash(cat:*),Bash(gh issue:*),Bash(gh label:*)"
            --max-turns 20

  plan-revise:
    name: Revise plan based on PM feedback
    timeout-minutes: 15
    # Triggered when PM adds 'needs:revision' to the plan sub-issue after requesting changes.
    # PM is a bot, so issue_comment sender.type=='User' never fires for PM feedback.
    # PM must add needs:revision to the PLAN sub-issue (not the parent) as the revision signal.
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'needs:revision' &&
      contains(github.event.issue.labels.*.name, 'agent/plan')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare system prompt
        run: cp .github/prompts/planner.md /tmp/system-prompt.txt

      - name: Run Planner Agent — Revision
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            You are the Planner Agent revising a plan after PM requested changes.

            PLAN SUB-ISSUE: #${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}

            The PM has added 'needs:revision' to this plan sub-issue after reviewing
            and requesting changes.

            Follow your system prompt revision instructions:
            1. Fetch this plan sub-issue's comments to find the existing PLAN_OUTPUT block
            2. Find the PM's feedback comment (most recent bot comment after the PLAN_OUTPUT)
            3. Revise the plan incorporating all PM feedback
            4. Post an updated PLAN_OUTPUT comment (status: revised) on this sub-issue
            5. Remove 'needs:revision' label from this sub-issue
            6. Read the SUB_ISSUE_META to find parent_issue, comment on parent: "Plan revised. See #<this_issue>."
            7. Add flow:pm-review to parent (remove flow:planning)
          claude_args: |
            --append-system-prompt-file /tmp/system-prompt.txt
            --verbose
            --model claude-sonnet-4-6
            --allowedTools "Read,Bash(grep:*),Bash(cat:*),Bash(gh issue:*),Bash(gh label:*)"
            --max-turns 20
