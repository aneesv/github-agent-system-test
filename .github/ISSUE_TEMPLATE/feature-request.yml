name: Feature Request
description: Request a new feature for the agent system to implement
labels: []
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What problem does this solve? Provide background and motivation.
    validations:
      required: true

  - type: textarea
    id: success_criteria
    attributes:
      label: Success Criteria
      description: How do we know this is done? List specific, testable criteria.
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Technical constraints, dependencies, or limitations to consider.

  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      options:
        - low
        - medium
        - high

  - type: textarea
    id: release_notes_hint
    attributes:
      label: Release Notes Hint
      description: One-line summary for the changelog.
